name: ci-3dview

on:
  push:
  pull_request:

jobs:
  smoke-test:
    name: 3d-viewer-smoke-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04, ubuntu-24.04]
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python runtime tooling
        run: python -m pip install --upgrade setuptools wheel

      - name: Install system packages (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgl1 libegl1 libxkbcommon-x11-0 libdbus-1-3

      - name: Install VTK/runtime deps into libs (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: call "[Windows]setup_python_libs.cmd"

      - name: Install VTK/runtime deps into libs (Linux)
        if: runner.os == 'Linux'
        run: bash "[Linux]setup_python_libs.sh"

      - name: Run 3D viewer smoke test (Windows)
        if: runner.os == 'Windows'
        env:
          MOTIONGLOVE_CI: "1"
          MOTIONGLOVE_CI_SECONDS: "0.2"
          MOTIONGLOVE_CI_RENDER: "0"
        run: python motionGloveSDK_example3_3dView.py

      - name: Run 3D viewer smoke test (Linux)
        if: runner.os == 'Linux'
        env:
          MOTIONGLOVE_CI: "1"
          MOTIONGLOVE_CI_SECONDS: "0.2"
          QT_QPA_PLATFORM: "offscreen"
        run: xvfb-run -a python motionGloveSDK_example3_3dView.py
